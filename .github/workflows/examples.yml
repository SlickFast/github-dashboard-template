# Keeps the README's layout examples genuinely LIVE: refreshes each example chart
# daily with facebook/react's current stats. Runs only in the template repo itself —
# copies made via "Use this template" don't inherit this repo's secrets, and the
# job skips cleanly without them.
name: examples

on:
  schedule:
    - cron: '30 6 * * *'   # daily
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        layout: [strip, square, contributors, graphs, ci, release, light]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Refresh the ${{ matrix.layout }} example (facebook/react)
        run: node update-dashboard.mjs
        env:
          SLICKFAST_KEY: ${{ secrets.SLICKFAST_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: facebook/react
          CHART_NAME: tt-${{ matrix.layout }}
          LAYOUT: ${{ matrix.layout }}
          WRITE_README: '0'
